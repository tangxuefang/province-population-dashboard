<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>省份人口统计 · 交互大屏</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg-primary: #040d1f;
      --bg-panel: rgba(10, 31, 63, 0.9);
      --accent: #00c8ff;
      --accent2: #0080ff;
      --text-primary: #c8daf5;
      --text-label: #5a8fc0;
      --border: rgba(0, 168, 255, 0.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 168, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 168, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      background: linear-gradient(90deg, rgba(0, 60, 120, 0.9) 0%, rgba(0, 20, 60, 0.95) 50%, rgba(0, 60, 120, 0.9) 100%);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent), #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .selected-info {
      font-size: 14px;
      color: var(--accent);
      padding: 6px 16px;
      background: rgba(0, 200, 255, 0.1);
      border: 1px solid var(--accent);
      border-radius: 20px;
    }
    .data-count {
      font-size: 12px;
      color: var(--text-label);
    }
    main {
      position: relative;
      z-index: 1;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      height: calc(100vh - 60px);
    }
    .kpi-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    .kpi-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
      transition: all 0.3s;
    }
    .kpi-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
    }
    .kpi-card .label {
      font-size: 11px;
      color: var(--text-label);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .kpi-card .value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    .kpi-card .unit {
      font-size: 11px;
      color: var(--text-label);
    }
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 8px;
      padding-left: 8px;
      border-left: 3px solid var(--accent);
    }
    .chart-box {
      flex: 1;
      min-height: 0;
    }
    .map-panel {
      grid-column: 2;
      grid-row: 2;
    }
    .map-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-label);
      margin-top: 4px;
    }
    .table-panel {
      grid-column: 1 / -1;
      grid-row: 3;
      max-height: 160px;
    }
    .table-wrap {
      flex: 1;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 6px 8px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 168, 255, 0.1);
    }
    th {
      background: rgba(0, 168, 255, 0.1);
      color: var(--accent);
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:hover {
      background: rgba(0, 168, 255, 0.1);
      cursor: pointer;
    }
    tr.selected {
      background: rgba(0, 200, 255, 0.2);
    }
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: var(--text-label);
      border-top: 1px solid var(--border);
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--accent);
      font-size: 14px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .loading { animation: pulse 1.5s infinite; }
  </style>
</head>

    </div>
  </main>

// 省份名称映射：数据库名称 -> 地图名称
const NAME_MAP = {
  '广东省': '广东', '山东省': '山东', '四川省': '四川', '辽宁省': '辽宁', 
  '浙江省': '浙江', '北京市': '北京', '河北省': '河北', '河南省': '河南',
  '湖北省': '湖北', '湖南省': '湖南', '江苏省': '江苏', '安徽省': '安徽',
  '福建省': '福建', '江西省': '江西', '云南省': '云南', '贵州省': '贵州',
  '陕西省': '陕西', '甘肃省': '甘肃', '青海省': '青海', '吉林省': '吉林',
  '黑龙江省': '黑龙江', '内蒙古自治区': '内蒙古', '新疆维吾尔自治区': '新疆',
  '广西壮族自治区': '广西', '海南省': '海南', '上海市': '上海', '天津市': '天津',
  '重庆市': '重庆', '西藏自治区': '西藏', '宁夏回族自治区': '宁夏', '山西省': '山西'
};

const TIP = {
  backgroundColor: 'rgba(0, 20, 60, 0.95)',
  borderColor: 'rgba(0, 168, 255, 0.4)',
  textStyle: { color: '#c8daf5', fontSize: 12 },
  extraCssText: 'box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);'
};

let selectedProvince = null;

document.getElementById('dataCount').textContent = '共 ' + DATA.length + ' 个省份数据';

function fmt(n, d = 0) {
  if (n == null) return '-';
  return Number(n).toLocaleString('zh-CN', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function updateSelectedInfo() {
  document.getElementById('selectedInfo').textContent = 
    selectedProvince ? '📍 当前查看: ' + selectedProvince : '📍 点击地图选择省份';
}

function getKpiData(key, filter) {
  const d = filter ? DATA.filter(filter) : DATA;
  if (key === 'total') return d.reduce((s, r) => s + (r.total_population || 0), 0);
  if (key === 'count') return d.length;
  const nums = d.map(r => r[key]).filter(v => v != null);
  if (!nums.length) return 0;
  return nums.reduce((a, b) => a + b, 0) / nums.length;
}

function updateKpis() {
  const d = selectedProvince ? DATA.filter(r => r.province_name === selectedProvince) : DATA;
  const kpis = [
    { id: 'kpi-total', key: 'total_population', fmt: v => fmt(v) },
    { id: 'kpi-birth', key: 'birth_rate', fmt: v => v.toFixed(2) },
    { id: 'kpi-urban', key: 'urbanization_rate', fmt: v => v.toFixed(1) },
    { id: 'kpi-gdp', key: 'gdp_per_capita', fmt: v => fmt(v) },
    { id: 'kpi-count', key: null, fmt: () => DATA.length }
  ];
  kpis.forEach(({ id, key, fmt: f }) => {
    const el = document.getElementById(id);
    const v = key ? getKpiData(key, selectedProvince ? r => r.province_name === selectedProvince : null) 
                  : DATA.length;
    el.querySelector('.value').textContent = f(v);
  });
}

let mapChart = null;
let mapGeoData = null;

// 初始化其他图表
function initOtherCharts() {
  // 人口排名
  const popChart = echarts.init(document.getElementById('chart-pop'));
  
  // 城镇化率
  const urbanChart = echarts.init(document.getElementById('chart-urban'));
  
  // 出生率vs死亡率
  const rateChart = echarts.init(document.getElementById('chart-rate'));
  
  // 年龄结构
  const ageChart = echarts.init(document.getElementById('chart-age'));
  
  // GDP排名
  const gdpChart = echarts.init(document.getElementById('chart-gdp'));
  
  // 响应式
  window.addEventListener('resize', () => {
    popChart.resize();
    urbanChart.resize();
    rateChart.resize();
    ageChart.resize();
    gdpChart.resize();
  });
  
  updateCharts();
}

async function initMap() {
  try {
    mapChart = echarts.init(document.getElementById('chart-map'));
    
    // 加载GeoJSON数据
    const resp = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
    const geoJson = await resp.json();
    mapGeoData = geoJson;
    
    echarts.registerMap('china', geoJson);
    
    const mapData = DATA.map(d => ({
      name: NAME_MAP[d.province_name] || d.province_name,
      value: d.total_population
    }));

    const option = {
      tooltip: {
        ...TIP,
        trigger: 'item',
        formatter: p => {
          if (!p.data) return p.name ? `${p.name}<br/><span style="color:#888">暂无数据</span>` : '';
          return `<strong>${p.name}</strong><br/>总人口: ${fmt(p.data.value)}万人`;
        }
      },
      visualMap: {
        min: 300,
        max: 13000,
        text: ['高', '低'],
        textStyle: { color: '#5a8fc0' },
        left: 20,
        bottom: 20,
        inRange: { color: ['#0a2f5c', '#0080ff', '#00c8ff'] },
        calculable: true
      },
      series: [{
        type: 'map',
        map: 'china',
        roam: true,
        zoom: 1.2,
        scaleLimit: { min: 0.8, max: 3 },
        emphasis: {
          itemStyle: { areaColor: '#00c8ff', shadowBlur: 20, shadowColor: 'rgba(0, 200, 255, 0.8)' },
          label: { show: true, color: '#fff', fontSize: 11 }
        },
        select: {
          itemStyle: { areaColor: '#00c8ff' },
          label: { show: true }
        },
        data: mapData
      }]
    };

    mapChart.setOption(option);
    
    mapChart.on('click', params => {
      if (params.data) {
        // 反向查找完整名称
        const fullName = Object.entries(NAME_MAP).find(([k, v]) => v === params.name)?.[0] || params.name;
        selectedProvince = fullName;
        updateAll();
      }
    });
    
    window.addEventListener('resize', () => mapChart.resize());
  } catch (e) {
    console.error('Map load error:', e);
    document.getElementById('chart-map').innerHTML = '<div class="loading">地图加载失败</div>';
  }
  
  // 无论如何都初始化其他图表
  initOtherCharts();
  updateAll();
}

function updateCharts() {
  const d = selectedProvince ? DATA.filter(r => r.province_name === selectedProvince) : DATA;
  
  // 人口排名
  const popChart = echarts.getInstanceByDom(document.getElementById('chart-pop'));
  if (popChart) {
    const sorted = [...DATA].sort((a, b) => b.total_population - a.total_population).slice(0, 10);
    popChart.setOption({
      tooltip: { ...TIP, trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { left: 80, right: 20, top: 10, bottom: 30 },
      xAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10 }, splitLine: { lineStyle: { color: 'rgba(0,168,255,0.05)' } } },
      yAxis: { type: 'category', data: sorted.map(r => r.province_name).reverse(), axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10 } },
      series: [{ type: 'bar', data: sorted.map(r => r.total_population).reverse(), itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#0080ff' }, { offset: 1, color: '#00c8ff' }]) }, barWidth: 12, label: { show: true, position: 'right', color: '#fff', fontSize: 10, formatter: '{c}万' } }]
    });
  }
  
  // 城镇化率
  const urbanChart = echarts.getInstanceByDom(document.getElementById('chart-urban'));
  if (urbanChart) {
    const sorted = [...DATA].sort((a, b) => b.urbanization_rate - a.urbanization_rate).slice(0, 10);
    urbanChart.setOption({
      tooltip: { ...TIP, trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { left: 80, right: 20, top: 10, bottom: 30 },
      xAxis: { type: 'value', max: 100, axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10 }, splitLine: { lineStyle: { color: 'rgba(0,168,255,0.05)' } } },
      yAxis: { type: 'category', data: sorted.map(r => r.province_name).reverse(), axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10 } },
      series: [{ type: 'bar', data: sorted.map(r => r.urbanization_rate).reverse(), itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#00a060' }, { offset: 1, color: '#00ff88' }]) }, barWidth: 12, label: { show: true, position: 'right', color: '#fff', fontSize: 10, formatter: '{c}%' } }]
    });
  }
  
  // 出生率 vs 死亡率
  const rateChart = echarts.getInstanceByDom(document.getElementById('chart-rate'));
  if (rateChart) {
    const sorted = [...DATA].sort((a, b) => b.birth_rate - a.birth_rate).slice(0, 8);
    rateChart.setOption({
      tooltip: { ...TIP, trigger: 'axis', axisPointer: { type: 'shadow' } },
      legend: { data: ['出生率', '死亡率'], textStyle: { color: '#5a8fc0' }, top: 0 },
      grid: { left: 50, right: 20, top: 30, bottom: 30 },
      xAxis: { type: 'category', data: sorted.map(r => r.province_name), axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10, rotate: 30 } },
      yAxis: { axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10 }, splitLine: { lineStyle: { color: 'rgba(0,168,255,0.05)' } } },
      series: [
        { name: '出生率', type: 'bar', data: sorted.map(r => r.birth_rate), itemStyle: { color: '#ff6b6b' }, barWidth: 15 },
        { name: '死亡率', type: 'bar', data: sorted.map(r => r.death_rate), itemStyle: { color: '#4ecdc4' }, barWidth: 15 }
      ]
    });
  }
  
  // 年龄结构
  const ageChart = echarts.getInstanceByDom(document.getElementById('chart-age'));
  if (ageChart) {
    const totals = d.reduce((acc, r) => ({
      '0-14岁': (acc['0-14岁'] || 0) + (r.age_0_14 || 0),
      '15-64岁': (acc['15-64岁'] || 0) + (r.age_15_64 || 0),
      '65岁以上': (acc['65岁以上'] || 0) + (r.age_65_plus || 0)
    }), {});
    const total = totals['0-14岁'] + totals['15-64岁'] + totals['65岁以上'];
    ageChart.setOption({
      tooltip: { ...TIP, trigger: 'item', formatter: p => `${p.name}<br/>${fmt(p.value)}万人 (${p.percent}%)` },
      legend: { textStyle: { color: '#5a8fc0' }, bottom: 0 },
      series: [{
        type: 'pie',
        radius: ['35%', '60%'],
        center: ['50%', '45%'],
        data: [
          { value: totals['0-14岁'], name: '0-14岁', itemStyle: { color: '#6c5ce7' } },
          { value: totals['15-64岁'], name: '15-64岁', itemStyle: { color: '#00b894' } },
          { value: totals['65岁以上'], name: '65岁以上', itemStyle: { color: '#e17055' } }
        ],
        label: { color: '#fff', fontSize: 10 },
        emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } }
      }]
    });
  }
  
  // GDP排名
  const gdpChart = echarts.getInstanceByDom(document.getElementById('chart-gdp'));
  if (gdpChart) {
    const sorted = [...DATA].sort((a, b) => b.gdp_per_capita - a.gdp_per_capita).slice(0, 10);
    gdpChart.setOption({
      tooltip: { ...TIP, trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { left: 80, right: 20, top: 10, bottom: 30 },
      xAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10, formatter: v => (v/10000).toFixed(0) + '万' }, splitLine: { lineStyle: { color: 'rgba(0,168,255,0.05)' } } },
      yAxis: { type: 'category', data: sorted.map(r => r.province_name).reverse(), axisLine: { lineStyle: { color: 'rgba(0,168,255,0.2)' } }, axisLabel: { color: '#5a8fc0', fontSize: 10 } },
      series: [{ type: 'bar', data: sorted.map(r => r.gdp_per_capita).reverse(), itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#f093fb' }, { offset: 1, color: '#f5576c' }]) }, barWidth: 12, label: { show: true, position: 'right', color: '#fff', fontSize: 10, formatter: p => (p.value/10000).toFixed(0) + '万' } }]
    });
  }
  
  updateKpis();
  updateTable();
}

function updateTable() {
  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');
  const cols = [
    { key: 'province_name', label: '省份' },
    { key: 'total_population', label: '总人口', fmt: v => fmt(v) + '万' },
    { key: 'birth_rate', label: '出生率‰', fmt: v => v?.toFixed(2) },
    { key: 'death_rate', label: '死亡率‰', fmt: v => v?.toFixed(2) },
    { key: 'urbanization_rate', label: '城镇化率%', fmt: v => v?.toFixed(1) },
    { key: 'gdp_per_capita', label: '人均GDP', fmt: v => fmt(v) + '元' }
  ];
  
  thead.innerHTML = '<tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr>';
  
  const data = [...DATA].sort((a, b) => b.total_population - a.total_population);
  tbody.innerHTML = data.map((r, i) => `
    <tr class="${selectedProvince === r.province_name ? 'selected' : ''}" onclick="selectRow('${r.province_name}')">
      ${cols.map(c => `<td>${c.fmt ? c.fmt(r[c.key]) : r[c.key]}</td>`).join('')}
    </tr>
  `).join('');
}

function selectRow(name) {
  selectedProvince = selectedProvince === name ? null : name;
  updateAll();
}

function updateAll() {
  updateSelectedInfo();
  updateCharts();
  if (mapChart) mapChart.resize();
}

initMap();
