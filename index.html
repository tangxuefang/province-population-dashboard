<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>省份人口统计 · 交互大屏</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js"></script>
  <style>
    :root {
      --bg-primary: #040d1f;
      --bg-panel: #0a1f3f;
      --bg-card: rgba(0,40,100,.8);
      --accent: #00c8ff;
      --accent-2: #0080ff;
      --text-primary: #c8daf5;
      --text-label: #5a8fc0;
      --border: rgba(0,168,255,.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,168,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,168,255,.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none; z-index: 0;
    }
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
      background: linear-gradient(90deg, rgba(0,60,120,.9) 0%, rgba(0,20,60,.95) 50%, rgba(0,60,120,.9) 100%);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 20px; font-weight: 700; letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent), #fff, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .selected-info {
      font-size: 14px;
      color: var(--accent);
      padding: 6px 16px;
      background: rgba(0,200,255,.1);
      border: 1px solid var(--accent);
      border-radius: 20px;
    }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .data-count { font-size: 12px; color: var(--text-label); }
    main {
      position: relative; z-index: 1;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      height: calc(100vh - 76px);
    }
    .kpi-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px;
      text-align: center;
      transition: all .3s;
    }
    .kpi-card.highlight { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,200,255,.3); }
    .kpi-card .label { font-size: 11px; color: var(--text-label); letter-spacing: 1px; margin-bottom: 6px; }
    .kpi-card .value { font-size: 24px; font-weight: 700; color: #fff; }
    .kpi-card .unit { font-size: 11px; color: var(--text-label); }
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
      display: flex; flex-direction: column;
    }
    .panel-title {
      font-size: 12px; font-weight: 600; letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 10px; padding-left: 10px;
      border-left: 3px solid var(--accent);
    }
    .chart-box { flex: 1; min-height: 0; }
    .map-panel { grid-column: 2; grid-row: 2; }
    .map-panel .chart-box { position: relative; }
    .map-hint {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-label);
      background: rgba(4,13,31,.8);
      padding: 4px 12px;
      border-radius: 12px;
    }
    .left-col { grid-column: 1; grid-row: 2; display: flex; flex-direction: column; gap: 16px; }
    .right-col { grid-column: 3; grid-row: 2; display: flex; flex-direction: column; gap: 16px; }
    .table-row { grid-column: 1 / -1; grid-row: 3; }
    .table-wrap { overflow-y: auto; flex: 1; max-height: 160px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead tr { background: rgba(0,80,160,.5); }
    thead th { padding: 8px 10px; text-align: left; color: var(--accent); font-weight: 600; }
    tbody tr { border-bottom: 1px solid rgba(0,100,200,.15); transition: background .2s; cursor: pointer; }
    tbody tr:hover { background: rgba(0,100,200,.2); }
    tbody tr.active { background: rgba(0,168,255,.2); }
    tbody td { padding: 6px 10px; }
    footer { text-align: center; padding: 8px; font-size: 11px; color: var(--text-label); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--text-label); border-radius: 3px; }
  </style>
</head>

<header>
  <h1>省份人口统计大屏</h1>
  <div class="header-right">

    <div class="selected-info" id="selectedInfo">点击地图选择省份</div>
  </div>
</header>

<main>
  <div class="kpi-row" id="kpi-row"></div>

  <div class="left-col">
    <div class="panel">

      <div class="chart-box" id="chart-pop"></div>

    <div class="panel">

  <div class="panel map-panel">
    <div class="panel-title">全国分布地图</div>
    <div class="chart-box" id="chart-map"></div>
    <div class="map-hint">📍 点击省份查看详情</div>
  </div>

  <div class="right-col">
    <div class="panel">
      <div class="panel-title">城镇化率排名</div>
      <div class="chart-box" id="chart-urban"></div>
    </div>
    <div class="panel">
      <div class="panel-title">人口结构分布</div>
      <div class="chart-box" id="chart-age"></div>
    </div>
    <div class="panel">
      <div class="panel-title">人均GDP（万元）</div>
      <div class="chart-box" id="chart-gdp"></div>
    </div>
  </div>

  <div class="panel table-row">
    <div class="panel-title">明细数据</div>
    <div class="table-wrap">
      <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</main>

const TIP = {
  backgroundColor: 'rgba(0,20,60,.92)',
  borderColor: 'rgba(0,168,255,.4)',
  textStyle: { color: '#c8daf5', fontSize: 12 },
};
const SPLIT_LINE = { lineStyle: { color: 'rgba(0,168,255,.08)' } };
const AXIS_LINE = { lineStyle: { color: 'rgba(0,168,255,.2)' } };
const AXIS_LABEL = { color: '#5a8fc0', fontSize: 11 };

let selectedProvince = null;

document.getElementById('dataCount').textContent = '共 ' + DATA.length + ' 个省份数据';

function updateSelectedInfo() {
  document.getElementById('selectedInfo').textContent = selectedProvince ? '📍 当前查看: ' + selectedProvince : '📍 点击地图选择省份';
}

function initMap() {
  const chart = echarts.init(document.getElementById('chart-map'));
  
  const mapData = DATA.map(d => ({
    name: d.province_name,
    value: d.total_population
  }));

  const option = {
    tooltip: {
      ...TIP,
      trigger: 'item',
      formatter: p => p.data ? `${p.name}<br/>总人口: ${p.data.value}万人` : (p.name ? `${p.name}<br/><span style="color:#888">暂无数据</span>` : '')
    },
    visualMap: {
      min: 300,
      max: 13000,
      text: ['高', '低'],
      textStyle: { color: '#5a8fc0' },
      left: 20,
      bottom: 20,
      inRange: { color: ['#0a2f5c', '#0080ff', '#00c8ff'] },
      calculable: true
    },
    series: [{
      type: 'map',
      map: 'china',
      roam: true,
      zoom: 1.2,
      scaleLimit: { min: 0.8, max: 3 },
      emphasis: {
        itemStyle: { areaColor: '#00c8ff', shadowBlur: 20, shadowColor: 'rgba(0,200,255,0.8)' },
        label: { show: true, color: '#fff', fontSize: 11 }
      },
      select: { itemStyle: { areaColor: '#00c8ff' }, label: { show: true } },
      data: mapData
    }]
  };

  chart.setOption(option);
  chart.on('click', params => {
    if (params.data) {
      selectedProvince = params.name;
      updateAllCharts();
    }
  });
  window.addEventListener('resize', () => chart.resize());
}

  const kpis = [
    { label: '总人口', field: 'total_population', unit: '万人', formatter: v => Math.round(v).toLocaleString() },
    { label: '平均出生率', field: 'birth_rate', unit: '‰', formatter: v => v.toFixed(2) },
    { label: '平均城镇化率', field: 'urbanization_rate', unit: '%', formatter: v => v.toFixed(1) },
    { label: '平均人均GDP', field: 'gdp_per_capita', unit: '元', formatter: v => (v/10000).toFixed(1) + '万' },
    { label: '省份数量', field: 'count', unit: '个', formatter: v => v }
  ];

  row.innerHTML = kpis.map(k => {
    let val;
    if (k.field === 'count') val = DATA.length;
    else if (selectedProvince) {
      const d = DATA.find(r => r.province_name === selectedProvince);
      val = d ? d[k.field] : '-';
    } else {
      const vals = DATA.map(r => r[k.field]).filter(v => v != null);
      val = vals.reduce((a,b) => a+b, 0) / vals.length;
    }
    return `<div class="kpi-card ${selectedProvince ? 'highlight' : ''}">
      <div class="label">${selectedProvince ? selectedProvince : '全国'}/${k.label}</div>
      <div class="value">${k.formatter(val)}</div>
      <div class="unit">${k.unit}</div>
    </div>`;
  }).join('');
}

function renderPopChart() {
  const chart = echarts.init(document.getElementById('chart-pop'));
  const data = selectedProvince ? DATA.filter(r => r.province_name === selectedProvince) : DATA;
  const sorted = [...data].sort((a,b) => b.total_population - a.total_population);

  chart.setOption({
    tooltip: { ...TIP, trigger: 'axis' },
    grid: { top: 10, right: 10, bottom: 30, left: 60 },
    xAxis: { type: 'value', axisLine: AXIS_LINE, splitLine: SPLIT_LINE, axisLabel: AXIS_LABEL },
    yAxis: { type: 'category', data: sorted.map(r => r.province_name), axisLine: AXIS_LINE, axisLabel: AXIS_LABEL },
    series: [{
      type: 'bar',
      data: sorted.map(r => ({ value: r.total_population, itemStyle: { color: r.province_name === selectedProvince ? '#00c8ff' : '#0080ff', borderRadius: [0, 4, 4, 0] } })),
      barMaxWidth: 16,
      label: { show: true, position: 'right', formatter: '{c}', color: '#5a8fc0', fontSize: 10 }
    }]
  });
  chart.resize();
}

function renderRateChart() {
  const chart = echarts.init(document.getElementById('chart-rate'));
  const data = selectedProvince ? DATA.filter(r => r.province_name === selectedProvince) : DATA;

  chart.setOption({
    tooltip: { ...TIP, trigger: 'axis', axisPointer: { type: 'shadow' } },
    legend: { data: ['出生率', '死亡率'], textStyle: { color: '#5a8fc0' }, top: 0 },
    grid: { top: 30, right: 10, bottom: 30, left: 40 },
    xAxis: { type: 'category', data: data.map(r => r.province_name), axisLine: AXIS_LINE, axisLabel: { ...AXIS_LABEL, rotate: 30 } },
    yAxis: { type: 'value', name: '‰', axisLine: AXIS_LINE, splitLine: SPLIT_LINE, axisLabel: AXIS_LABEL },
    series: [
      { name: '出生率', type: 'bar', data: data.map(r => ({ value: r.birth_rate, itemStyle: { color: '#00c8ff', borderRadius: [4, 4, 0, 0] } })), barMaxWidth: 12 },
      { name: '死亡率', type: 'bar', data: data.map(r => ({ value: r.death_rate, itemStyle: { color: '#ff4060', borderRadius: [4, 4, 0, 0] } })), barMaxWidth: 12 }
    ]
  });
  chart.resize();
}

function renderUrbanChart() {
  const chart = echarts.init(document.getElementById('chart-urban'));
  const data = selectedProvince ? DATA.filter(r => r.province_name === selectedProvince) : DATA;
  const sorted = [...data].sort((a,b) => b.urbanization_rate - a.urbanization_rate);

  chart.setOption({
    tooltip: { ...TIP, trigger: 'axis' },
    grid: { top: 10, right: 40, bottom: 30, left: 60 },
    xAxis: { type: 'value', max: 100, axisLine: AXIS_LINE, splitLine: SPLIT_LINE, axisLabel: AXIS_LABEL },
    yAxis: { type: 'category', data: sorted.map(r => r.province_name), axisLine: AXIS_LINE, axisLabel: AXIS_LABEL },
    series: [{
      type: 'bar',
      data: sorted.map(r => ({ value: r.urbanization_rate, itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color: r.urbanization_rate > 70 ? '#00e0a0' : '#0080ff' }, { offset: 1, color: '#00c8ff' }] }, borderRadius: [0, 4, 4, 0] } })),
      barMaxWidth: 14,
      label: { show: true, position: 'right', formatter: '{c}%', color: '#5a8fc0', fontSize: 10 }
    }]
  });
  chart.resize();
}

function renderAgeChart() {
  const chart = echarts.init(document.getElementById('chart-age'));
  const data = selectedProvince ? DATA.filter(r => r.province_name === selectedProvince) : DATA;
  const totals = { '0-14岁': 0, '15-64岁': 0, '65岁以上': 0 };
  data.forEach(d => { totals['0-14岁'] += d.age_0_14 || 0; totals['15-64岁'] += d.age_15_64 || 0; totals['65岁以上'] += d.age_65_plus || 0; });

  chart.setOption({
    tooltip: { ...TIP, trigger: 'item', formatter: p => `${p.name}<br/>${Math.round(p.value)}万人<br/>占比: ${p.percent}%` },
    legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#5a8fc0' } },
    series: [{
      type: 'pie', radius: ['35%', '65%'], center: ['35%', '50%'],
      data: [
        { name: '0-14岁', value: Math.round(totals['0-14岁']), itemStyle: { color: '#00c8ff' } },
        { name: '15-64岁', value: Math.round(totals['15-64岁']), itemStyle: { color: '#0080ff' } },
        { name: '65岁以上', value: Math.round(totals['65岁以上']), itemStyle: { color: '#ff9020' } }
      ],
      label: { show: false },
      emphasis: { scale: true, scaleSize: 8 }
    }]
  });
  chart.resize();
}

function renderGdpChart() {
  const chart = echarts.init(document.getElementById('chart-gdp'));
  const data = selectedProvince ? DATA.filter(r => r.province_name === selectedProvince) : DATA;
  const sorted = [...data].sort((a,b) => b.gdp_per_capita - a.gdp_per_capita);

  chart.setOption({
    tooltip: { ...TIP, trigger: 'axis', formatter: p => `${p.name}<br/>人均GDP: ${(p.value/10000).toFixed(1)}万元` },
    grid: { top: 10, right: 10, bottom: 30, left: 60 },
    xAxis: { type: 'value', axisLine: AXIS_LINE, splitLine: SPLIT_LINE, axisLabel: AXIS_LABEL },
    yAxis: { type: 'category', data: sorted.map(r => r.province_name), axisLine: AXIS_LINE, axisLabel: AXIS_LABEL },
    series: [{
      type: 'bar',
      data: sorted.map(r => ({ value: r.gdp_per_capita, itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color: '#ff9020' }, { offset: 1, color: '#ff4060' }] }, borderRadius: [0, 4, 4, 0] } })),
      barMaxWidth: 14,
      label: { show: true, position: 'right', formatter: p => (p.value/10000).toFixed(0), color: '#5a8fc0', fontSize: 10 }
    }]
  });
  chart.resize();
}

function renderTable() {
  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');
  const cols = [
    { label: '省份', field: 'province_name' },
    { label: '总人口(万)', field: 'total_population' },
    { label: '出生率‰', field: 'birth_rate' },
    { label: '死亡率‰', field: 'death_rate' },
    { label: '城镇化率%', field: 'urbanization_rate' },
    { label: '人均GDP(元)', field: 'gdp_per_capita' }
  ];

  thead.innerHTML = `<tr>${cols.map(c => `<th>${c.label}</th>`).join('')}</tr>`;
  tbody.innerHTML = DATA.map((r, i) => `<tr class="${r.province_name === selectedProvince ? 'active' : ''}" onclick="selectRow('${r.province_name}')">${cols.map(c => `<td>${r[c.field] != null ? r[c.field] : '-'}</td>`).join('')}</tr>`).join('');
}

function selectRow(name) {
  selectedProvince = name;
  updateAllCharts();
}

function updateAllCharts() {
  updateSelectedInfo();
  renderKPI();
  renderPopChart();
  renderRateChart();
  renderUrbanChart();
  renderAgeChart();
  renderGdpChart();
  renderTable();
}

initMap();
updateAllCharts();

window.addEventListener('resize', () => {
  renderPopChart();
  renderRateChart();
  renderUrbanChart();
  renderAgeChart();
  renderGdpChart();
});
</script>
</body>
</html>
